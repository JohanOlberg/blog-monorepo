<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>List Categories</title>

  <link rel="stylesheet" href="./list-category.css">
</head>
<body>

  <main class="page">

    <header class="page-header">
      <div>
        <span>CATEGORY / CMS</span>
        <h1>Categories</h1>
        <p>Manage editorial structure and visual identity.</p>
      </div>

      <button>Create Category</button>
    </header>

    <section class="category-list">

      <article class="category-row">
        <div class="category-color" style="background:#2afc98"></div>

        <div class="category-info">
          <strong>Frontend</strong>
          <small>frontend · 23 posts</small>
        </div>

        <div class="category-actions">
          <button>Edit</button>
        </div>
      </article>

      <article class="category-row">
        <div class="category-color" style="background:#bba7ff"></div>

        <div class="category-info">
          <strong>Architecture</strong>
          <small>architecture · 12 posts</small>
        </div>

        <div class="category-actions">
          <button>Edit</button>
        </div>
      </article>

      <article class="category-row">
        <div class="category-color" style="background:#ffb347"></div>

        <div class="category-info">
          <strong>Backend</strong>
          <small>backend · 9 posts</small>
        </div>

        <div class="category-actions">
          <button>Edit</button>
        </div>
      </article>

    </section>

  </main>

</body>
</html>
